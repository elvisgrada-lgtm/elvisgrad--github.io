<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <style>
        /* Estilos básicos para centrar y limpiar los márgenes */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Contenedor principal del formulario */
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 24px;
            text-align: center;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        /* Grupo de cada campo */
        .form-group {
            margin-bottom: 18px;
        }

        /* Etiquetas principales */
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #34495e;
        }

        /* Inputs de texto, número, etc. */
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Evita que el input se salga del contenedor */
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Contenedor específico para los Radio Buttons (Sexo) */
        .radio-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        /* Estilo para las etiquetas de los radio buttons */
        .radio-group label {
            display: inline;
            font-weight: normal;
            cursor: pointer;
            margin-bottom: 0;
        }

        .radio-group input[type="radio"] {
            cursor: pointer;
            margin-right: 4px;
        }

        /* Botón de envío */
        button[type="submit"] {
            width: 100%;
            background-color: #3498db;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <form action="procesar_inscripcion.php" method="POST" class="form-container">
        <h2>Ingrese los datos del alumno</h2>
        
        <div class="form-group">
            <label for="nombre-completo">Nombre completo</label>
            <input type="text" id="nombre-completo" name="name_complete" placeholder="Ej. Juan Pérez" required>
        </div>

        <div class="form-group">
            <label for="grado-cursar">Grado a cursar</label>
            <input type="text" id="grado-cursar" name="degree_to_be_studied" placeholder="Ej. 1er grado a cursar" required>
        </div>

        <div class="form-group">
            <label for="edad">Edad</label>
            <input type="number" id="edad" name="age" placeholder="Ej. 12" required> 
        </div>

        <!-- Nueva sección: Sexo/Género del estudiante -->
        <div class="form-group">
            <label>Sexo:</label>
            <div class="radio-group">
                <input type="radio" id="sexo-femenino" name="gender" value="femenino" required>
                <label for="sexo-femenino">Femenino</label>

                <input type="radio" id="sexo-masculino" name="gender" value="masculino">
                <label for="sexo-masculino">Masculino</label>
            </div>
        </div>

        <div class="form-group">
            <label for="discapacidad">¿Sufre alguna discapacidad?</label>
            <input type="text" id="discapacidad" name="suffers_from_a_disability" placeholder="Ej. Ninguna / Visual" required>
        </div>

        <div>
            <button type="submit">Enviar Inscripción</button>
        </div>
    </form>

</body>
</html>
